# Integration test overrides - use with --env-file config/env/env.int
# Tests service integration with infrastructure components
#
# Usage:
#   Run all tests: ./scripts/run-integration-tests.sh
#   Run specific test: ./scripts/run-integration-tests.sh tests/integration/test_retry_daemon.py -v
#
# Integration test configuration:
# - LOG_LEVEL: DEBUG for all services
# - No port mappings (tests run inside container network)
# - tmpfs volumes for speed
# - Test service with infrastructure dependencies
#
# Note: Container ENTRYPOINT is 'pytest', so pass pytest args directly (not 'pytest' itself)

services:
  grafana-alloy:
    image: alpine:latest
    command: sh -c "echo 'Telemetry disabled for integration tests' && sleep infinity"
    volumes: !reset []

  init:
    volumes:
      - ./coverage:/app/coverage:rw
    environment:
      COVERAGE_PROCESS_START: /app/pyproject.toml
      COVERAGE_FILE: /app/coverage/init.integration
      PYTEST_RUNNING: "1"

  api:
    volumes:
      - ./coverage:/app/coverage:rw
    environment:
      COVERAGE_PROCESS_START: /app/pyproject.toml
      COVERAGE_FILE: /app/coverage/api.integration
      LOG_LEVEL: DEBUG
      PYTEST_RUNNING: "1"
      SSE_KEEPALIVE_INTERVAL_SECONDS: ${SSE_KEEPALIVE_INTERVAL_SECONDS:-30}
      RATE_LIMIT_COUNT: ${RATE_LIMIT_COUNT:-2}
      RATE_LIMIT_1_COUNT: ${RATE_LIMIT_1_COUNT:-60}
      RATE_LIMIT_1_TIME: ${RATE_LIMIT_1_TIME:-60}
      RATE_LIMIT_2_COUNT: ${RATE_LIMIT_2_COUNT:-100}
      RATE_LIMIT_2_TIME: ${RATE_LIMIT_2_TIME:-300}
      DISCORD_API_BASE_URL: http://fake-discord:8080/api/v10

  scheduler:
    volumes:
      - ./coverage:/app/coverage:rw
    environment:
      COVERAGE_PROCESS_START: /app/pyproject.toml
      COVERAGE_FILE: /app/coverage/scheduler.integration
      LOG_LEVEL: DEBUG
      PYTEST_RUNNING: "1"

  retry-daemon:
    volumes:
      - ./coverage:/app/coverage:rw
    environment:
      COVERAGE_PROCESS_START: /app/pyproject.toml
      COVERAGE_FILE: /app/coverage/retry.integration
      LOG_LEVEL: DEBUG
      PYTEST_RUNNING: "1"

  postgres:
    command: [
      "postgres",
      "-c", "log_min_messages=debug1"
    ]

  rabbitmq:
    environment:
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbit log_levels [{connection,debug}]

  system-ready:
    image: alpine:latest
    container_name: ${CONTAINER_PREFIX:-gamebot-integration}-system-ready
    command: sh -c "echo 'System ready for testing' && sleep infinity"
    depends_on:
      init:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
      retry-daemon:
        condition: service_started
      scheduler:
        condition: service_started
      fake-discord:
        condition: service_healthy
    networks:
      - app-network
    restart: "no"

  bot:
    environment:
      PYTEST_RUNNING: "1"
      BOT_SKIP_STARTUP: "1"

  integration-tests:
    build:
      context: .
      dockerfile: docker/test.Dockerfile
      args:
        CACHE_SHARING_MODE: ${CACHE_SHARING_MODE:-private}
    container_name: ${CONTAINER_PREFIX:-gamebot-integration}-tests
    volumes:
      - ./coverage:/app/coverage:rw
    environment:
      COVERAGE_FILE: /app/coverage/runner.integration
      PYTEST_RUNNING: "1"
      DATABASE_URL: ${DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      REDIS_URL: ${TEST_REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      TEST_ENVIRONMENT: ${TEST_ENVIRONMENT}
      SSE_KEEPALIVE_INTERVAL_SECONDS: ${SSE_KEEPALIVE_INTERVAL_SECONDS:-30}
      RATE_LIMIT_COUNT: ${RATE_LIMIT_COUNT:-2}
      RATE_LIMIT_1_COUNT: ${RATE_LIMIT_1_COUNT:-60}
      RATE_LIMIT_1_TIME: ${RATE_LIMIT_1_TIME:-60}
      RATE_LIMIT_2_COUNT: ${RATE_LIMIT_2_COUNT:-100}
      RATE_LIMIT_2_TIME: ${RATE_LIMIT_2_TIME:-300}
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_ADMIN_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_ADMIN_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD}
      POSTGRES_BOT_USER: ${POSTGRES_BOT_USER}
      POSTGRES_BOT_PASSWORD: ${POSTGRES_BOT_PASSWORD}
      BOT_DATABASE_URL: ${BOT_DATABASE_URL}
      ADMIN_DATABASE_URL: ${ADMIN_DATABASE_URL}
    depends_on:
      system-ready:
        condition: service_started
    networks:
      - app-network
    entrypoint: ["pytest", "-m", "integration"]
    command: -q --tb=line

  fake-discord:
    build:
      context: .
      dockerfile: docker/test.Dockerfile
      args:
        CACHE_SHARING_MODE: ${CACHE_SHARING_MODE:-private}
    container_name: ${CONTAINER_PREFIX:-gamebot-integration}-fake-discord
    entrypoint: ["python"]
    command: ["tests/integration/fixtures/fake_discord_app.py"]
    environment:
      PORT: "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v10/users/@me"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network
    restart: "no"

# Use tmpfs for test volumes (in-memory, fast, auto-cleanup)
volumes:
  postgres_data:
    name: ${CONTAINER_PREFIX:-gamebot-integration}-postgres-data
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
  rabbitmq_data:
    name: ${CONTAINER_PREFIX:-gamebot-integration}-rabbitmq-data
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
  redis_data:
    name: ${CONTAINER_PREFIX:-gamebot-integration}-redis-data
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs

networks:
  app-network:
    name: ${CONTAINER_PREFIX:-gamebot-integration}-test-network
    driver: bridge
