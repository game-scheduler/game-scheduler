# Staging overrides - use with --env-file config/env/env.staging
# Production builds with DEBUG logging and app-only port exposure
#
# Usage: docker compose --env-file config/env/env.staging up -d
#
# Staging configuration:
# - LOG_LEVEL: DEBUG (for troubleshooting)
# - restart: always (production-like behavior)
# - No port mappings (reverse proxy handles external access)
# - Production build targets (code baked into images)

services:
  api:
    build:
      target: production
    environment:
      LOG_LEVEL: DEBUG

  bot:
    build:
      target: production
    environment:
      LOG_LEVEL: DEBUG

  scheduler:
    build:
      target: production
    environment:
      LOG_LEVEL: DEBUG

  frontend:
    build:
      target: production
    depends_on:
      api:
        condition: service_healthy
      scheduler:
        condition: service_healthy
      retry-daemon:
        condition: service_healthy
    environment:
      LOG_LEVEL: debug
    volumes:
      - ${HOST_WORKSPACE_FOLDER:-.}/docker/Caddyfile.staging:/etc/caddy/Caddyfile:ro

  postgres:
    command: [
      "postgres",
      "-c", "log_min_messages=debug1"
    ]

  rabbitmq:
    environment:
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbit log_levels [{connection,debug}]

networks:
  app-network:
    name: ${CONTAINER_PREFIX:-gamebot-staging}-network
    driver: bridge
    external: true
