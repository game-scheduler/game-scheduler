# Production overrides - use with --env-file config/env/env.prod
# Minimal overrides since compose.yaml provides production-ready defaults
#
# Usage: docker compose --env-file config/env/env.prod up -d
#
# Production configuration:
# - LOG_LEVEL: INFO (from compose.yaml base)
# - restart: always (from compose.yaml base)
# - No port mappings (reverse proxy handles external access)
# - Production build targets from Dockerfiles

services:
  api:
    build:
      target: production

  bot:
    build:
      target: production

  scheduler:
    build:
      target: production

  frontend:
    build:
      target: production
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ${HOST_WORKSPACE_FOLDER:-.}/docker/Caddyfile.prod:/etc/caddy/Caddyfile:ro
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    depends_on:
      api:
        condition: service_healthy
      scheduler:
        condition: service_healthy
      retry-daemon:
        condition: service_healthy

networks:
  app-network:
    name: ${CONTAINER_PREFIX:-gamebot-prod}-network
    driver: bridge
    external: true

volumes:
  caddy_data:
  caddy_config:
