# Production-ready base configuration
#
# This file contains complete service definitions for all environments.
# Use --env-file to specify environment-specific configuration.
#
# Environments:
# - Development: docker compose up (auto-loads compose.override.yaml)
# - Production: docker compose --env-file config/env/env.prod up -d
# - Staging: docker compose --env-file config/env/env.staging up -d
# - E2E Tests: docker compose --env-file config/env/env.e2e up
# - Integration: docker compose --env-file config/env/env.int up
#
# Production defaults:
# - INFO log level
# - No port mappings (reverse proxy handles external access)
# - restart: always policy

x-logging-default: &logging-default
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"
    compress: "true"
    labels: "service,environment"

services:
  postgres:
    # Pin to specific patch version to avoid breaking changes in Docker image updates
    # PostgreSQL 18.1 is compatible with the /var/lib/postgresql volume mount structure
    # See: https://github.com/docker-library/postgres/pull/1259
    image: postgres:18.1-alpine
    container_name: ${CONTAINER_PREFIX:-gamebot}-postgres
    command: [
      "postgres",
      "-c", "log_min_messages=${POSTGRES_LOG_LEVEL:-info}"
    ]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - app-network
    logging: *logging-default
    labels:
      service: "postgres"
      environment: "${ENVIRONMENT:-production}"

  rabbitmq:
    image: rabbitmq:4.2-management-alpine
    container_name: ${CONTAINER_PREFIX:-gamebot}-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbit log_levels [{connection,${RABBITMQ_LOG_LEVEL:-info}}]
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ${HOST_WORKSPACE_FOLDER:-.}/config.template/rabbitmq:/etc/rabbitmq:ro
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - app-network
    logging: *logging-default
    labels:
      service: "rabbitmq"
      environment: "${ENVIRONMENT:-production}"

  redis:
    image: valkey/valkey:9.0.1-alpine
    container_name: ${CONTAINER_PREFIX:-gamebot}-redis
    entrypoint: ["sh", "/usr/local/bin/redis-entrypoint.sh"]
    command: ${REDIS_COMMAND:-valkey-server --aclfile /tmp/users.acl --appendonly yes --loglevel ${REDIS_LOG_LEVEL:-notice}}
    environment:
      BOT_REDIS_PASSWORD: ${BOT_REDIS_PASSWORD}
      API_REDIS_PASSWORD: ${API_REDIS_PASSWORD}
      TEST_REDIS_PASSWORD: ${TEST_REDIS_PASSWORD}
    volumes:
      - redis_data:/data
      - ./docker/redis-entrypoint.sh:/usr/local/bin/redis-entrypoint.sh:ro
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - app-network
    logging: *logging-default
    labels:
      service: "redis"
      environment: "${ENVIRONMENT:-production}"

  init:
    build:
      context: .
      dockerfile: docker/init.Dockerfile
      args:
        CACHE_SHARING_MODE: ${CACHE_SHARING_MODE:-private}
      tags:
        - ${IMAGE_REGISTRY:-}game-scheduler-init:${IMAGE_TAG:-latest}
      x-bake:
        platforms:
          - linux/amd64
          - linux/arm64
    image: ${IMAGE_REGISTRY:-}game-scheduler-init:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_PREFIX:-gamebot}-init
    environment:
      # Admin user for migrations and schema changes
      DATABASE_URL: ${ADMIN_DATABASE_URL:-${DATABASE_URL}}
      ADMIN_DATABASE_URL: ${ADMIN_DATABASE_URL:-${DATABASE_URL}}
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_ADMIN_USER: ${POSTGRES_ADMIN_USER:-}
      POSTGRES_ADMIN_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:-}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:-}
      POSTGRES_BOT_USER: ${POSTGRES_BOT_USER:-}
      POSTGRES_BOT_PASSWORD: ${POSTGRES_BOT_PASSWORD:-}
      RABBITMQ_URL: ${RABBITMQ_URL}
      OTEL_SERVICE_NAME: init-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://grafana-alloy:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      grafana-alloy:
        condition: service_started
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/init-complete"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s
    networks:
      - app-network
    restart: unless-stopped
    logging: *logging-default
    labels:
      service: "init"
      environment: "${ENVIRONMENT:-production}"

  bot:
    build:
      context: .
      dockerfile: docker/bot.Dockerfile
      args:
        CACHE_SHARING_MODE: ${CACHE_SHARING_MODE:-private}
      tags:
        - ${IMAGE_REGISTRY:-}game-scheduler-bot:${IMAGE_TAG:-latest}
      x-bake:
        platforms:
          - linux/amd64
          - linux/arm64
    image: ${IMAGE_REGISTRY:-}game-scheduler-bot:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_PREFIX:-gamebot}-bot
    restart: always
    environment:
      # Bot user bypasses RLS (member of all guilds by design)
      DATABASE_URL: ${BOT_DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_URL: ${BOT_REDIS_URL:-redis://redis:6379/0}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_BOT_CLIENT_ID: ${DISCORD_BOT_CLIENT_ID:-}
      DISCORD_BOT_CLIENT_SECRET: ${DISCORD_BOT_CLIENT_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      BACKEND_URL: ${BACKEND_URL:-http://api:8000}
      LOG_LEVEL: ${BOT_LOG_LEVEL:-INFO}
      OTEL_SERVICE_NAME: bot-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://grafana-alloy:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
    depends_on:
      init:
        condition: service_healthy
      grafana-alloy:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/bot-ready || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 180s
      retries: 12
    networks:
      - app-network
    logging: *logging-default
    labels:
      service: "bot"
      environment: "${ENVIRONMENT:-production}"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      args:
        CACHE_SHARING_MODE: ${CACHE_SHARING_MODE:-private}
      tags:
        - ${IMAGE_REGISTRY:-}game-scheduler-api:${IMAGE_TAG:-latest}
      x-bake:
        platforms:
          - linux/amd64
          - linux/arm64
    image: ${IMAGE_REGISTRY:-}game-scheduler-api:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_PREFIX:-gamebot}-api
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BOT_DATABASE_URL: ${BOT_DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_URL: ${API_REDIS_URL:-redis://redis:6379/0}
      DISCORD_BOT_CLIENT_ID: ${DISCORD_BOT_CLIENT_ID}
      DISCORD_BOT_CLIENT_SECRET: ${DISCORD_BOT_CLIENT_SECRET}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${API_LOG_LEVEL:-INFO}
      SSE_KEEPALIVE_INTERVAL_SECONDS: ${SSE_KEEPALIVE_INTERVAL_SECONDS:-30}
      RATE_LIMIT_COUNT: ${RATE_LIMIT_COUNT:-2}
      RATE_LIMIT_1_COUNT: ${RATE_LIMIT_1_COUNT:-60}
      RATE_LIMIT_1_TIME: ${RATE_LIMIT_1_TIME:-60}
      RATE_LIMIT_2_COUNT: ${RATE_LIMIT_2_COUNT:-100}
      RATE_LIMIT_2_TIME: ${RATE_LIMIT_2_TIME:-300}
      OTEL_SERVICE_NAME: api-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://grafana-alloy:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
    depends_on:
      init:
        condition: service_healthy
      bot:
        condition: service_healthy
      grafana-alloy:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network
    logging: *logging-default
    labels:
      service: "api"
      environment: "${ENVIRONMENT:-production}"

  scheduler:
    build:
      context: .
      dockerfile: docker/scheduler.Dockerfile
      args:
        CACHE_SHARING_MODE: ${CACHE_SHARING_MODE:-private}
      tags:
        - ${IMAGE_REGISTRY:-}game-scheduler-scheduler:${IMAGE_TAG:-latest}
      x-bake:
        platforms:
          - linux/amd64
          - linux/arm64
    image: ${IMAGE_REGISTRY:-}game-scheduler-scheduler:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_PREFIX:-gamebot}-scheduler
    restart: always
    environment:
      # Bot user for daemon service (system-wide queries, bypasses RLS)
      DATABASE_URL: ${BOT_DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      LOG_LEVEL: ${SCHEDULER_LOG_LEVEL:-INFO}
      OTEL_SERVICE_NAME: scheduler-daemon
      OTEL_EXPORTER_OTLP_ENDPOINT: http://grafana-alloy:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
    depends_on:
      init:
        condition: service_healthy
      grafana-alloy:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys; sys.exit(0)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network
    logging: *logging-default
    labels:
      service: "scheduler"
      environment: "${ENVIRONMENT:-production}"

  retry-daemon:
    build:
      context: .
      dockerfile: docker/retry.Dockerfile
      args:
        CACHE_SHARING_MODE: ${CACHE_SHARING_MODE:-private}
      tags:
        - ${IMAGE_REGISTRY:-}game-scheduler-retry-daemon:${IMAGE_TAG:-latest}
      x-bake:
        platforms:
          - linux/amd64
          - linux/arm64
    image: ${IMAGE_REGISTRY:-}game-scheduler-retry-daemon:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_PREFIX:-gamebot}-retry-daemon
    restart: always
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      RETRY_INTERVAL_SECONDS: ${RETRY_INTERVAL_SECONDS:-900}
      LOG_LEVEL: ${RETRY_DAEMON_LOG_LEVEL:-INFO}
      OTEL_SERVICE_NAME: retry-daemon
      OTEL_EXPORTER_OTLP_ENDPOINT: http://grafana-alloy:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
    depends_on:
      init:
        condition: service_healthy
      grafana-alloy:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "pgrep",
          "-f",
          "retry_daemon_wrapper",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network
    logging: *logging-default
    labels:
      service: "retry-daemon"
      environment: "${ENVIRONMENT:-production}"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_BACKEND_URL: ${BACKEND_URL}
      tags:
        - ${IMAGE_REGISTRY:-}game-scheduler-frontend:${IMAGE_TAG:-latest}
      x-bake:
        platforms:
          - linux/amd64
          - linux/arm64
    image: ${IMAGE_REGISTRY:-}game-scheduler-frontend:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_PREFIX:-gamebot}-frontend
    restart: always
    environment:
      BACKEND_URL: ${BACKEND_URL:-}
      LOG_LEVEL: ${FRONTEND_LOG_LEVEL:-info}
    volumes:
      - ${HOST_WORKSPACE_FOLDER:-.}/docker/Caddyfile.staging:/etc/caddy/Caddyfile:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - app-network
    logging: *logging-default
    labels:
      service: "frontend"
      environment: "${ENVIRONMENT:-production}"

  grafana-alloy:
    image: grafana/alloy:latest
    container_name: ${CONTAINER_PREFIX:-gamebot}-grafana-alloy
    restart: always
    volumes:
      - ${HOST_WORKSPACE_FOLDER:-.}/config/grafana-alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      ALLOY_LOG_LEVEL: ${ALLOY_LOG_LEVEL:-info}
      GRAFANA_CLOUD_OTLP_INSTANCE_ID: ${GRAFANA_CLOUD_OTLP_INSTANCE_ID:-}
      GRAFANA_CLOUD_OTLP_ENDPOINT: ${GRAFANA_CLOUD_OTLP_ENDPOINT:-}
      GRAFANA_CLOUD_PROMETHEUS_INSTANCE_ID: ${GRAFANA_CLOUD_PROMETHEUS_INSTANCE_ID:-}
      GRAFANA_CLOUD_PROMETHEUS_ENDPOINT: ${GRAFANA_CLOUD_PROMETHEUS_ENDPOINT:-}
      GRAFANA_CLOUD_LOKI_ENDPOINT: ${GRAFANA_CLOUD_LOKI_ENDPOINT:-}
      GRAFANA_CLOUD_LOKI_INSTANCE_ID: ${GRAFANA_CLOUD_LOKI_INSTANCE_ID:-}
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY:-}
      POSTGRES_USER: ${POSTGRES_USER:-gamebot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-game_scheduler}
    command:
      run --server.http.listen-addr=0.0.0.0:12345
      --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    networks:
      - app-network
    logging: *logging-default
    labels:
      service: "grafana-alloy"
      environment: "${ENVIRONMENT:-production}"

  cloudflared:
    image: cloudflare/cloudflared:2026.2.0
    container_name: ${CONTAINER_PREFIX:-gamebot}-cloudflared
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - api
    networks:
      - app-network
    logging: *logging-default
    labels:
      service: "cloudflared"
      environment: "${ENVIRONMENT:-production}"
    profiles:
      - cloudflare

  backup:
    build:
      context: .
      dockerfile: docker/backup.Dockerfile
      tags:
        - ${IMAGE_REGISTRY:-}game-scheduler-backup:${IMAGE_TAG:-latest}
      x-bake:
        platforms:
          - linux/amd64
          - linux/arm64
    image: ${IMAGE_REGISTRY:-}game-scheduler-backup:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_PREFIX:-gamebot}-backup
    restart: always
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      BACKUP_DEST: ${BACKUP_DEST}
      BACKUP_S3_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID:-}
      BACKUP_S3_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-us-east-1}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-14}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 */12 * * *}
    volumes:
      - backup_data:/var/lib/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    logging: *logging-default
    labels:
      service: "backup"
      environment: "${ENVIRONMENT:-production}"

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local
  redis_data:
    driver: local
  backup_data:
    driver: local

networks:
  app-network:
    name: gamebot-network
    driver: bridge
