# CI/CD Pipeline
#
# PREREQUISITE: The `suppression-gate` job requires a GitHub Environment named
# `lint-suppression-review` with designated required reviewers. This environment
# must be created manually in repository Settings → Environments before the
# workflow functions correctly. See docs/developer/ci-cd.md for setup steps.

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Fetch base branch ref
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }} --depth=1 --no-tags

      - name: Get changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          elif [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD^"
          else
            BASE="${{ github.event.before }}"
          fi
          PY=$(git diff --name-only --diff-filter=d "$BASE" HEAD -- '*.py' | tr '\n' ' ')
          TS=$(git diff --name-only --diff-filter=d "$BASE" HEAD -- '*.ts' '*.tsx' | tr '\n' ' ')
          FE=$(git diff --name-only --diff-filter=d "$BASE" HEAD -- 'frontend/' | tr '\n' ' ')
          echo "py_files=${PY}" >> "$GITHUB_OUTPUT"
          echo "has_py=$([ -n "${PY}" ] && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"
          echo "ts_files=${TS}" >> "$GITHUB_OUTPUT"
          echo "has_ts=$([ -n "${TS}" ] && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"
          echo "has_frontend=$([ -n "${FE}" ] && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"

      - name: Check copyright headers
        run: |
          uv run autocopyright -s "#" -l ./templates/mit-template.jinja2 -d services -g "*.py" -d shared -g "*.py" -d tests -g "*.py"
          uv run autocopyright -s "#" -l ./templates/mit-template.jinja2 -d scripts -g "*.sh"
          uv run autocopyright -s "//" -l ./templates/mit-template.jinja2 -d frontend/src -g "*.ts" -d frontend/src -g "*.tsx"
          git diff --exit-code

      - name: Python compilation check
        if: steps.changed.outputs.has_py == 'true'
        run: uv run python -m compileall -q services shared tests

      - name: Ruff format check
        if: steps.changed.outputs.has_py == 'true'
        run: uv run ruff format --check ${{ steps.changed.outputs.py_files }}

      - name: Ruff lint
        if: steps.changed.outputs.has_py == 'true'
        run: uv run ruff check ${{ steps.changed.outputs.py_files }}

      - name: Mypy type check
        if: steps.changed.outputs.has_py == 'true'
        run: uv run mypy shared/ services/

      - name: Install frontend dependencies
        if: steps.changed.outputs.has_ts == 'true' || steps.changed.outputs.has_frontend == 'true'
        working-directory: frontend
        run: npm ci

      - name: Prettier format check
        if: steps.changed.outputs.has_frontend == 'true'
        working-directory: frontend
        run: npm run format:check

      - name: ESLint
        if: steps.changed.outputs.has_ts == 'true'
        working-directory: frontend
        run: npm run lint

      - name: TypeScript type check
        if: steps.changed.outputs.has_ts == 'true'
        working-directory: frontend
        run: npm run type-check

      - name: Complexipy cognitive complexity
        if: steps.changed.outputs.has_py == 'true'
        run: uv run complexipy .

      - name: Lizard TypeScript complexity
        if: steps.changed.outputs.has_ts == 'true'
        run: uv run lizard -l typescript frontend/src/ --CCN 15 --warnings_only

      - name: Check for blocked lint suppressions
        run: |
          COMPARE_BRANCH="${{ github.base_ref || github.event.repository.default_branch }}"
          uv run python scripts/check_lint_suppressions.py --compare-branch "origin/${COMPARE_BRANCH}" --ci

      - name: Check for merge conflict markers
        run: |
          if grep -rn '<<<<<<< ' --include='*.py' --include='*.ts' --include='*.tsx' .; then
            echo "ERROR: Merge conflict markers found"
            exit 1
          fi

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        env:
          TESTING: true
        run: uv run pytest --timeout=30 -p no:randomly --cov --cov-report=xml -qq

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-coverage
          path: coverage.xml
          retention-days: 1

  diff-coverage:
    name: Python Diff Coverage
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: python-coverage

      - name: Fetch base branch ref
        run: git fetch origin ${{ github.base_ref }} --depth=1 --no-tags

      - name: Check diff coverage
        run: >
          uv run diff-cover coverage.xml
          --compare-branch=origin/${{ github.base_ref }}
          --fail-under=90
          --ignore-whitespace

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Fix lcov paths for diff-cover
        if: github.event_name == 'pull_request'
        working-directory: frontend
        run: |
          sed "s|^SF:src/|SF:frontend/src/|g" coverage/lcov.info > coverage/lcov-fixed.info

      - name: Install uv
        if: github.event_name == 'pull_request'
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - name: Set up Python
        if: github.event_name == 'pull_request'
        run: uv python install 3.13

      - name: Install Python dependencies
        if: github.event_name == 'pull_request'
        run: uv sync --extra dev

      - name: Check frontend diff coverage
        if: github.event_name == 'pull_request'
        run: >
          uv run diff-cover frontend/coverage/lcov-fixed.info
          --compare-branch=origin/${{ github.base_ref }}
          --fail-under=90
          --ignore-whitespace

  build-test-publish:
    name: Build, Test, and Publish
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, frontend-tests, diff-coverage, check-suppressions, suppression-gate, jscpd-check]
    if: >-
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run integration tests
        run: scripts/run-integration-tests.sh

      - name: Log in to Container Registry
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && github.repository == 'game-scheduler/game-scheduler'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push images
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && github.repository == 'game-scheduler/game-scheduler'
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          MAJOR="${VERSION%%.*}"
          MINOR="${VERSION#*.}"; MINOR="${MINOR%%.*}"

          TAGS=("$VERSION" "$MAJOR.$MINOR" "$MAJOR")
          [[ "$REF_NAME" != *-* ]] && TAGS+=("latest")

          # service name → local compose image name
          PAIRS=(
            "api:game-scheduler-api"
            "bot:game-scheduler-bot"
            "scheduler:game-scheduler-scheduler"
            "frontend:game-scheduler-frontend"
            "init:game-scheduler-init"
            "retry:game-scheduler-retry-daemon"
          )

          for pair in "${PAIRS[@]}"; do
            service="${pair%%:*}"
            local_image="${pair#*:}:latest"
            remote_base="${REGISTRY}/${IMAGE_NAME}-${service}"
            for tag in "${TAGS[@]}"; do
              docker tag "$local_image" "${remote_base}:${tag}"
              docker push "${remote_base}:${tag}"
            done
          done

  check-suppressions:
    name: Check Lint Suppressions
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      suppression_count: ${{ steps.scan.outputs.suppression_count }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Fetch base branch ref
        run: git fetch origin ${{ github.base_ref }} --depth=1 --no-tags

      - name: Scan for counted suppressions
        id: scan
        run: |
          output=$(uv run python scripts/check_lint_suppressions.py \
            --compare-branch origin/${{ github.base_ref }} \
            --ci)
          count=$(echo "$output" | grep '^SUPPRESSION_COUNT=' | cut -d= -f2)
          echo "suppression_count=${count:-0}" >> "$GITHUB_OUTPUT"

  suppression-gate:
    name: Suppression Gate
    runs-on: ubuntu-latest
    needs: check-suppressions
    if: >
      github.event_name == 'pull_request' &&
      needs.check-suppressions.outputs.suppression_count > 0
    environment: lint-suppression-review

    steps:
      - name: Suppression gate passed by reviewer
        run: echo "Suppression gate passed by reviewer"

  jscpd-check:
    name: Duplicate Code Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate duplicate code report
        run: >
          npx jscpd services shared frontend/src
          --config .jscpd.json
          --threshold 100
          --reporters json
          --output .jscpd-report

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Fetch base branch ref
        run: git fetch origin ${{ github.base_ref }} --depth=1 --no-tags

      - name: Check duplicates against PR diff
        run: >
          uv run python scripts/check_commit_duplicates.py
          .jscpd-report/jscpd-report.json
          --compare-branch origin/${{ github.base_ref }}
